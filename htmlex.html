<!DOCTYPE html>

<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="panel" name="header">
        <h1>My Dashboard</h1>
    </div>

<div class="container">
    <div class="panel" name="system_stats">
        <h2>Main Computer</h2>
        <p id="cpu-temp">CPU Temperature: </p>
        <p>GPU Temperature: </p>
        <p>Ethernet Signal: </p>
    </div>
    <div class="panel" name="server_stats">
        <h2>bast_server</h2>
        <p>CPU Temperature: </p>
        <p>GPU Temperature: </p>
        <p>Jellyfin: </p>
        <p>Ethernet Signal: </p>
    </div>
</div>

<script src="script.js"></script>

</body>

</html>
