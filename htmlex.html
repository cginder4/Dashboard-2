<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel header-panel">
    <h1>My Dashboard</h1>
  </div>

  <div class="container">
    <div class="panel creatine-panel" name="creatine_tracker">
      <h2>Creatine Tracker</h2>
      <p id="creatine-feedback">Creatine not logged yet</p>
      <p id="streak">Current streak: 0 days</p>
      <button id="creatine-taken-button" type="button">Creatine Taken</button>
    </div>

    <div class="panel" name="server_stats">
      <h2>Server Stats</h2>
      <p id="cpu-temp">CPU: </p>
      <p id="RAM">RAM: </p>
      <p id="jellyfin_status">Jellyfin: </p>
    </div>

    <div class="panel" name="clock">
      <h2>Clock</h2>
      <p id="clock">Time: </p>
    </div>

    <div class="panel weight-panel" name="bodyweight_tracker">
      <h2>Bodyweight Tracker</h2>
      <form id="weight-form" class="tracker-form">
        <label for="weight-date">Date</label>
        <input id="weight-date" type="date" required>
        <label for="weight-value">Weight (lb)</label>
        <input id="weight-value" type="number" step="0.1" min="0" required>
        <button type="submit">Log weight</button>
      </form>

      <div class="summary-row">
        <div>
          <p class="summary-label">Current</p>
          <p id="weight-current" class="summary-value">—</p>
        </div>
        <div>
          <p class="summary-label">7-day change</p>
          <p id="weight-change" class="summary-value">—</p>
        </div>
      </div>

      <svg id="weight-chart" viewBox="0 0 320 140" role="img" aria-label="Bodyweight chart"></svg>
      <ul id="weight-history" class="history-list"></ul>
    </div>

    <div class="panel workout-panel" name="workout_tracker">
      <h2>Workout Tracker</h2>
      <div class="tracker-form">
        <label for="workout-day-title">Workout day name</label>
        <input id="workout-day-title" type="text" placeholder="Back day">
        <label for="workout-day-date">Date</label>
        <input id="workout-day-date" type="date" required>
        <button id="create-workout-day-btn" type="button">Create workout day</button>
      </div>

      <div id="workout-day-builder"></div>
      <div id="workout-day-summary" class="workout-day-summary"></div>
      <p id="workout-save-status" class="empty-text"></p>

      <div class="summary-row">
        <div>
          <p class="summary-label">Saved workout days</p>
          <p id="workout-count" class="summary-value">0</p>
        </div>
      </div>

      <div id="workout-history" class="history-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
